version: "3.8"

services:
  # FastAPI Microservice
  api:
    build: .
    container_name: kok-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Point the python script to the container named "ollama"
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
    volumes:
      # Map the host's relative directory to the container's app directory
      - ./vector_db:/app/vector_db
      - ./data:/app/data
    networks:
      - default
      - shared_llm_net

  # Web Dashboard
  ui:
    build: .
    container_name: kok-ui
    # Overrides the default Uvicorn command in the Dockerfile
    command:
      [
        "streamlit",
        "run",
        "src/ui.py",
        "--server.port=8501",
        "--server.address=0.0.0.0",
      ]
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - KOK_API_URL=http://kok-api:8000
    depends_on:
      - api
    networks:
      - default

networks:
  # Define the shared network
  shared_llm_net:
    external: true
